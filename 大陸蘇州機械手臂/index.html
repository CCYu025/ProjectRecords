<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大陸蘇州機械手臂 — 專案紀錄</title>
  <style>
    html { scroll-behavior: smooth; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── Sticky wrapper ── */
    .sticky-header { position: sticky; top: 0; z-index: 100; }


    /* ── Month tabs ── */
    .month-tabs {
      background: #FDFAF6;
      border-bottom: 2px solid #E8E0D4;
      padding: 0 40px;
      display: flex;
      gap: 4px;
    }
    .month-tab {
      padding: 10px 18px;
      border: none;
      background: none;
      font-size: 1rem;
      font-weight: 600;
      color: #7A6E63;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }
    .month-tab.active { color: #2563EB; border-bottom-color: #2563EB; }
    .month-tab:hover:not(.active) { color: #1A1A1A; }

    /* ── Side date index ── */
    .date-index {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      left: max(12px, calc(50% - 430px - 80px));
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 50;
    }
    .date-index-item {
      display: block;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #7A6E63;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .date-index-item:hover { background: #E8E0D4; color: #1A1A1A; }
    .date-index-item.active { background: #2563EB; color: #fff; }
    @media (max-width: 1080px) { .date-index { display: none; } }

    /* ── 橫向日期膠囊列 ── */
    .date-chips {
      display: none;
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 8px 16px;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .date-chips::-webkit-scrollbar { display: none; }
    @media (max-width: 1080px) { .date-chips { display: flex; } }

    .date-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      color: #7A6E63;
      text-decoration: none;
      background: #F0EBE3;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .date-chip:hover { background: #E8E0D4; color: #1A1A1A; }
    .date-chip.active { background: #2563EB; color: #fff; }

    /* ── Main content ── */
    main { max-width: 860px; margin: 0 auto; padding: 40px 40px; }

    /* ── Date groups ── */
    .date-group { margin-bottom: 40px; }
    .date-group:last-child { margin-bottom: 0; }

    .date-heading {
      font-size: 1.0625rem;
      font-weight: 700;
      color: #7A6E63;
      letter-spacing: 0.04em;
      padding-bottom: 10px;
      border-bottom: 1px solid #E8E0D4;
      margin-bottom: 16px;
    }

    /* ── Task items ── */
    .task-item {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 16px;
    }
    .task-item:last-child { margin-bottom: 0; }

    .task-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-title::before {
      content: '';
      width: 3px; height: 16px;
      background: #2563EB;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .task-desc {
      font-size: 1rem;
      color: #5C4E43;
      line-height: 1.7;
      margin: 4px 0 14px;
    }

    .task-images { display: flex; gap: 12px; flex-wrap: wrap; }
    .task-images img {
      width: 100%;
      max-width: 380px;
      height: 240px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #E8E0D4;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }
    .task-images img:hover { opacity: 0.88; }
    .img-wrapper { flex: 1; min-width: 200px; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: min(90vw, 960px); max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: block; cursor: zoom-out;
    }
    #lightbox-caption {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 1rem; padding: 6px 18px;
      border-radius: 9999px; white-space: nowrap; pointer-events: none;
    }
    #lightbox-close {
      position: fixed; top: 18px; right: 22px;
      background: none; border: none; color: #fff;
      font-size: 1.75rem; cursor: pointer; line-height: 1; opacity: 0.8;
    }
    #lightbox-close:hover { opacity: 1; }
    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      font-size: 1.5rem; width: 44px; height: 64px;
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    .lb-nav:disabled { opacity: 0.2; cursor: default; }
    #lb-prev { left: 16px; } #lb-next { right: 16px; }
    #lb-counter {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .month-tabs { padding: 0 20px; }
      main { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="sticky-header">
    <!-- 月份 Tab — 由 renderRecordsInto 自動生成 -->
    <div class="month-tabs"></div>
    <!-- 橫向日期膠囊 — 由 renderRecordsInto 自動生成 -->
    <div class="date-chips"></div>
  </div>

  <!-- 側邊日期索引 — 由 renderRecordsInto 自動生成 -->
  <nav class="date-index" aria-label="日期導覽"></nav>

  <!-- 主內容 — 由 renderRecordsInto 自動生成 -->
  <main></main>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="關閉">&#x2715;</button>
    <span id="lb-counter"></span>
    <button class="lb-nav" id="lb-prev" aria-label="上一張">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lb-nav" id="lb-next" aria-label="下一張">&#8250;</button>
    <span id="lightbox-caption"></span>
  </div>

  <script src="records.js"></script>
  <script>
    // ── Step 1：從 records.js 渲染所有 DOM ──
    renderRecordsInto(大陸蘇州機械手臂Records, '', {
      tabsEl:  document.querySelector('.month-tabs'),
      chipsEl: document.querySelector('.date-chips'),
      indexEl: document.querySelector('.date-index'),
      mainEl:  document.querySelector('main')
    });

    // ── Step 2：初始化（DOM 已就緒）──

    // scroll-margin-top
    function updateScrollMargin() {
      var h = document.querySelector('.sticky-header').offsetHeight;
      document.querySelectorAll('.date-group').forEach(function(g) {
        g.style.scrollMarginTop = (h + 16) + 'px';
      });
    }
    updateScrollMargin();
    window.addEventListener('resize', updateScrollMargin);

    // 月份切換
    var tabs       = document.querySelectorAll('.month-tab');
    var sections   = document.querySelectorAll('.month-section');
    var indexItems = document.querySelectorAll('.date-index-item');
    var chipItems  = document.querySelectorAll('.date-chip');

    function syncNav(month, activeHref) {
      [indexItems, chipItems].forEach(function(group) {
        group.forEach(function(item) {
          var belongs = item.dataset.month === month;
          item.style.display = belongs ? '' : 'none';
          item.classList.toggle('active', belongs && item.getAttribute('href') === activeHref);
        });
      });
    }

    // 導航鎖（初始鎖定 600ms，防止 observer 覆蓋預設 active 狀態）
    var isNavigating = true;
    var navTimer = setTimeout(function() { isNavigating = false; }, 600);
    function lockNav(href, month) {
      window.scrollTo({ top: window.scrollY, behavior: 'instant' });
      syncNav(month, href);
      isNavigating = true;
      clearTimeout(navTimer);
      navTimer = setTimeout(function() { isNavigating = false; }, 600);
      var target = document.querySelector(href);
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    }

    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        var month = tab.dataset.month;
        tabs.forEach(function(t) { t.classList.toggle('active', t === tab); });
        sections.forEach(function(s) {
          s.style.display = s.dataset.month === month ? '' : 'none';
        });
        var firstItem = document.querySelector('.date-index-item[data-month="' + month + '"]');
        var firstHref = firstItem ? firstItem.getAttribute('href') : '';
        syncNav(month, firstHref);
        isNavigating = true;
        clearTimeout(navTimer);
        navTimer = setTimeout(function() { isNavigating = false; }, 800);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    indexItems.forEach(function(item) {
      item.addEventListener('click', function(e) { e.preventDefault(); lockNav(item.getAttribute('href'), item.dataset.month); });
    });
    chipItems.forEach(function(item) {
      item.addEventListener('click', function(e) { e.preventDefault(); lockNav(item.getAttribute('href'), item.dataset.month); });
    });

    // IntersectionObserver
    var dateGroups = document.querySelectorAll('.date-group[id]');
    var observer = new IntersectionObserver(function(entries) {
      if (isNavigating) return;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var href = '#' + entry.target.id;
          var activeMonth = (document.querySelector('.month-tab.active') || {}).dataset.month || '';
          syncNav(activeMonth, href);
          var activeChip = document.querySelector('.date-chip[href="' + href + '"]');
          if (activeChip) activeChip.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
        }
      });
    }, { rootMargin: '-12% 0px -82% 0px' });
    dateGroups.forEach(function(g) { observer.observe(g); });

    // Lightbox
    var imgs    = Array.from(document.querySelectorAll('.task-images img'));
    var current = 0;
    var lb      = document.getElementById('lightbox');
    var lbImg   = document.getElementById('lightbox-img');
    var lbCap   = document.getElementById('lightbox-caption');
    var lbClose = document.getElementById('lightbox-close');
    var lbPrev  = document.getElementById('lb-prev');
    var lbNext  = document.getElementById('lb-next');
    var lbCount = document.getElementById('lb-counter');

    function lbOpen(index) {
      current = index;
      var img = imgs[current];
      lbImg.src = img.src; lbImg.alt = img.alt;
      var titleEl = img.closest('.task-item') ? img.closest('.task-item').querySelector('.task-title') : null;
      lbCap.textContent = titleEl ? titleEl.textContent.trim() : '';
      lbCount.textContent = (current + 1) + ' / ' + imgs.length;
      lbPrev.disabled = current === 0;
      lbNext.disabled = current === imgs.length - 1;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function lbClose_() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function lbPrev_() { if (current > 0) lbOpen(current - 1); }
    function lbNext_() { if (current < imgs.length - 1) lbOpen(current + 1); }

    imgs.forEach(function(img, i) { img.addEventListener('click', function() { lbOpen(i); }); });
    lbImg.addEventListener('click', lbClose_);
    lbClose.addEventListener('click', lbClose_);
    lbPrev.addEventListener('click', lbPrev_);
    lbNext.addEventListener('click', lbNext_);
    lb.addEventListener('click', function(e) { if (e.target === lb) lbClose_(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     lbClose_();
      if (e.key === 'ArrowLeft')  lbPrev_();
      if (e.key === 'ArrowRight') lbNext_();
    });
  </script>


</body>
</html>
