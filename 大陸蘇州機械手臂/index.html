<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大陸蘇州機械手臂 — 專案紀錄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── Sticky wrapper ── */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ── Header ── */
    header {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 1rem;
      color: #2563EB;
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }
    .back-link:hover { text-decoration: underline; }
    .header-divider {
      width: 1px;
      height: 20px;
      background: #E8E0D4;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1A1A1A;
    }

    /* ── Info bar ── */
    .info-bar {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .badge-active { background: #FEF3C7; color: #92400E; }
    .badge-active::before { background: #F59E0B; }

    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 1rem;
      color: #7A6E63;
    }
    .info-item .icon { font-size: 1rem; }
    .info-item strong { color: #2D2620; }

    /* ── Month tabs ── */
    .month-tabs {
      background: #FDFAF6;
      border-bottom: 2px solid #E8E0D4;
      padding: 0 40px;
      display: flex;
      gap: 4px;
    }
    .month-tab {
      padding: 10px 18px;
      border: none;
      background: none;
      font-size: 0.9rem;
      font-weight: 600;
      color: #7A6E63;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }
    .month-tab.active {
      color: #2563EB;
      border-bottom-color: #2563EB;
    }
    .month-tab:hover:not(.active) { color: #1A1A1A; }

    /* ── Side date index ── */
    .date-index {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      left: max(12px, calc(50% - 430px - 80px));
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 50;
    }
    .date-index-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #A89E93;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: center;
    }
    .date-index-item {
      display: block;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #7A6E63;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .date-index-item:hover { background: #E8E0D4; color: #1A1A1A; }
    .date-index-item.active { background: #2563EB; color: #fff; }

    @media (max-width: 1080px) { .date-index { display: none; } }

    /* ── 橫向日期膠囊列（窄螢幕替代側邊索引）── */
    .date-chips {
      display: none;
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 8px 16px;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .date-chips::-webkit-scrollbar { display: none; }
    @media (max-width: 1080px) { .date-chips { display: flex; } }

    .date-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #7A6E63;
      text-decoration: none;
      background: #F0EBE3;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .date-chip:hover { background: #E8E0D4; color: #1A1A1A; }
    .date-chip.active { background: #2563EB; color: #fff; }

    /* ── Main content ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 40px;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #7A6E63;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ── Date groups ── */
    .date-group {
      margin-bottom: 40px;
    }
    .date-group:last-child { margin-bottom: 0; }

    .date-heading {
      font-size: 0.875rem;
      font-weight: 700;
      color: #7A6E63;
      letter-spacing: 0.04em;
      padding-bottom: 10px;
      border-bottom: 1px solid #E8E0D4;
      margin-bottom: 16px;
    }

    /* ── Task items ── */
    .task-item {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .task-item:last-child { margin-bottom: 0; }

    .task-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-title::before {
      content: '';
      width: 3px;
      height: 16px;
      background: #2563EB;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .task-desc {
      font-size: 15px;
      color: #5C4E43;
      line-height: 1.7;
      margin: 4px 0 14px;
    }

    .task-images {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .task-images img {
      width: 100%;
      max-width: 380px;
      height: 240px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #E8E0D4;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }
    .task-images img:hover { opacity: 0.88; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: min(90vw, 960px);
      max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: block;
    }

    #lightbox-caption {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.875rem;
      padding: 6px 18px;
      border-radius: 9999px;
      white-space: nowrap;
      pointer-events: none;
    }

    #lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }
    #lightbox-close:hover { opacity: 1; }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 44px;
      height: 64px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    .lb-nav:disabled { opacity: 0.2; cursor: default; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    #lb-counter {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
    }
    .img-caption {
      font-size: 0.75rem;
      color: #A89E93;
      margin-top: 6px;
      text-align: center;
    }
    .img-wrapper {
      flex: 1;
      min-width: 200px;
    }

    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .info-bar { padding: 12px 20px; }
      .month-tabs { padding: 0 20px; }
      main { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="sticky-header">
    <header>
      <a class="back-link" href="../index.html">← 返回目錄</a>
      <div class="header-divider"></div>
      <h1>大陸蘇州機械手臂</h1>
    </header>

    <div class="info-bar">
      <span class="badge badge-active">進行中</span>
      <div class="info-item">
        <span class="icon">📅</span>
        <span>開始日期：<strong>2026/04/10</strong></span>
      </div>
      <div class="info-item">
        <span class="icon">📍</span>
        <span>地點：<strong>毅豐橡膠</strong></span>
      </div>
    </div>

    <div class="month-tabs">
      <button class="month-tab active" data-month="2026-04">2026 / 04</button>
      <!-- 新增月份時在此加 button，data-month="2026-05" -->
    </div>

    <div class="date-chips">
      <a class="date-chip active" data-month="2026-04" href="#d20260410">04/10</a>
      <a class="date-chip" data-month="2026-04" href="#d20260411">04/11</a>
      <!-- 新增日期時在此加 a，data-month 對應月份 -->
    </div>
  </div>

  <!-- 側邊日期索引 -->
  <nav class="date-index" aria-label="日期導覽">
    <div class="date-index-label">日期</div>
    <a class="date-index-item active" data-month="2026-04" href="#d20260410">04/10</a>
    <a class="date-index-item" data-month="2026-04" href="#d20260411">04/11</a>
    <!-- 新增日期時在此加 a，data-month 對應月份 -->
  </nav>

  <main>

    <!-- ── 2026/04 ── -->
    <div class="month-section" data-month="2026-04">

      <!-- 2026/04/10 -->
      <div class="date-group" id="d20260410">
        <div class="date-heading">2026 / 04 / 10</div>

        <div class="task-item">
          <div class="task-title">機械手臂設備抵達廠內，完成卸貨定位</div>
          <div class="task-images">
            <div class="img-wrapper">
              <img src="照片/20260410/S__25829379.jpg" alt="機械手臂設備抵達廠內">
            </div>
          </div>
        </div>

        <div class="task-item">
          <div class="task-title">配電箱初步裝配作業</div>
          <div class="task-images">
            <div class="img-wrapper">
              <img src="照片/20260410/S__25829380.jpg" alt="配電箱初步裝配">
            </div>
          </div>
        </div>

      </div>

      <!-- 2026/04/11 -->
      <div class="date-group" id="d20260411">
        <div class="date-heading">2026 / 04 / 11</div>

        <div class="task-item">
          <div class="task-title">2號、3號配電箱初步裝配</div>
          <div class="task-images">
            <div class="img-wrapper">
              <img src="照片/20260411/S__25878531_0.jpg" alt="2號、3號配電箱初步裝配">
            </div>
          </div>
        </div>

        <div class="task-item">
          <div class="task-title">RB-1底架初步裝配</div>
          <div class="task-images">
            <div class="img-wrapper">
              <img src="照片/20260411/S__25878532_0.jpg" alt="RB-1底架初步裝配">
            </div>
          </div>
        </div>

        <div class="task-item">
          <div class="task-title">RB-2 底架初步組立</div>
          <div class="task-desc">完成 RB-2 機器手臂與軌道台座的初步組立。</div>
          <div class="task-images">
            <div class="img-wrapper">
              <img src="照片/20260411/S__25911299_0.jpg" alt="RB-2 底架初步組立">
            </div>
            <div class="img-wrapper">
              <img src="照片/20260411/S__25911300_0.jpg" alt="RB-2 底架初步組立">
            </div>
          </div>
        </div>

      </div>

      <!-- 新增日期群組時在此往下加 date-group -->

    </div>

    <!-- 新增月份時在此往下加 month-section，data-month="2026-05"，預設 display:none -->

  </main>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="關閉">&#x2715;</button>
    <span id="lb-counter"></span>
    <button class="lb-nav" id="lb-prev" aria-label="上一張">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lb-nav" id="lb-next" aria-label="下一張">&#8250;</button>
    <span id="lightbox-caption"></span>
  </div>

  <script>
    // ── 動態設定 scroll-margin-top ──
    function updateScrollMargin() {
      const h = document.querySelector('.sticky-header').offsetHeight;
      document.querySelectorAll('.date-group').forEach(g => {
        g.style.scrollMarginTop = (h + 16) + 'px';
      });
    }
    updateScrollMargin();
    window.addEventListener('resize', updateScrollMargin);

    // ── 月份切換 ──
    const tabs       = document.querySelectorAll('.month-tab');
    const sections   = document.querySelectorAll('.month-section');
    const indexItems = document.querySelectorAll('.date-index-item');
    const chipItems  = document.querySelectorAll('.date-chip');

    // 同步更新側邊索引與橫向膠囊列
    function syncNav(month, activeHref) {
      [indexItems, chipItems].forEach(group => {
        group.forEach(item => {
          const belongs = item.dataset.month === month;
          item.style.display = belongs ? '' : 'none';
          item.classList.toggle('active', belongs && item.getAttribute('href') === activeHref);
        });
      });
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const month = tab.dataset.month;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        sections.forEach(s => {
          s.style.display = s.dataset.month === month ? '' : 'none';
        });
        const firstHref = document.querySelector(`.date-index-item[data-month="${month}"]`)
                          ?.getAttribute('href') || '';
        syncNav(month, firstHref);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    // ── 導航鎖：點擊時立即更新顏色，再封鎖 Observer 避免捲動衝突 ──
    let isNavigating = false;
    function lockNav(href, month) {
      syncNav(month, href);   // 先更新顏色
      isNavigating = true;    // 再封鎖 Observer
      setTimeout(() => { isNavigating = false; }, 900);
    }
    indexItems.forEach(item => item.addEventListener('click', () =>
      lockNav(item.getAttribute('href'), item.dataset.month)));
    chipItems.forEach(item => item.addEventListener('click', () =>
      lockNav(item.getAttribute('href'), item.dataset.month)));

    // ── 捲動時同步高亮側邊索引與膠囊列 ──
    const dateGroups = document.querySelectorAll('.date-group[id]');
    const activeMoth = () => document.querySelector('.month-tab.active')?.dataset.month || '';
    const observer = new IntersectionObserver(entries => {
      if (isNavigating) return;
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const href = `#${entry.target.id}`;
          syncNav(activeMoth(), href);
          // 橫向膠囊列：block:'nearest' 確保只做橫向捲動，不影響頁面垂直位置
          const activeChip = document.querySelector(`.date-chip[href="${href}"]`);
          if (activeChip) activeChip.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
        }
      });
    }, { rootMargin: '-30% 0px -60% 0px' });
    dateGroups.forEach(g => observer.observe(g));

    // ── Lightbox ──
    const imgs     = Array.from(document.querySelectorAll('.task-images img'));
    let current    = 0;
    const lb       = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbCap    = document.getElementById('lightbox-caption');
    const lbClose  = document.getElementById('lightbox-close');
    const lbPrev   = document.getElementById('lb-prev');
    const lbNext   = document.getElementById('lb-next');
    const lbCount  = document.getElementById('lb-counter');

    function open(index) {
      current = index;
      const img = imgs[current];
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      const taskItem = img.closest('.task-item');
      const titleEl  = taskItem ? taskItem.querySelector('.task-title') : null;
      lbCap.textContent = titleEl ? titleEl.textContent.trim() : '';
      lbCount.textContent = `${current + 1} / ${imgs.length}`;
      lbPrev.disabled = current === 0;
      lbNext.disabled = current === imgs.length - 1;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }
    function prev() { if (current > 0) open(current - 1); }
    function next() { if (current < imgs.length - 1) open(current + 1); }

    imgs.forEach((img, i) => img.addEventListener('click', () => open(i)));
    lbClose.addEventListener('click', close);
    lbPrev.addEventListener('click', prev);
    lbNext.addEventListener('click', next);
    lb.addEventListener('click', e => { if (e.target === lb) close(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     close();
      if (e.key === 'ArrowLeft')  prev();
      if (e.key === 'ArrowRight') next();
    });
  </script>

</body>
</html>
