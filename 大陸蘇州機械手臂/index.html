<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大陸蘇州機械手臂 — 專案紀錄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: #2563EB;
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }
    .back-link:hover { text-decoration: underline; }
    .header-divider {
      width: 1px;
      height: 20px;
      background: #E8E0D4;
    }
    header h1 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #1A1A1A;
    }

    /* ── Info bar ── */
    .info-bar {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .badge-active { background: #FEF3C7; color: #92400E; }
    .badge-active::before { background: #F59E0B; }

    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #7A6E63;
    }
    .info-item .icon { font-size: 0.9rem; }
    .info-item strong { color: #2D2620; }

    /* ── Main content ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 40px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #7A6E63;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
      padding-left: 0;
    }

    /* Vertical line */
    .timeline::before {
      content: '';
      position: absolute;
      left: 118px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: #E8E0D4;
    }

    .timeline-entry {
      display: flex;
      gap: 0;
      margin-bottom: 40px;
    }
    .timeline-entry:last-child { margin-bottom: 0; }

    /* Date column */
    .entry-date {
      width: 118px;
      flex-shrink: 0;
      padding-right: 24px;
      text-align: right;
      padding-top: 4px;
    }
    .entry-date .date-text {
      font-size: 0.8rem;
      font-weight: 600;
      color: #5C4E43;
      line-height: 1.4;
    }

    /* Dot */
    .entry-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2563EB;
      border: 3px solid #F5F0E8;
      box-shadow: 0 0 0 2px #2563EB;
      flex-shrink: 0;
      margin-top: 3px;
      position: relative;
      z-index: 1;
    }

    /* Content column */
    .entry-content {
      flex: 1;
      padding-left: 20px;
    }

    /* Task items within an entry */
    .task-item {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .task-item:last-child { margin-bottom: 0; }

    .task-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-title::before {
      content: '';
      width: 3px;
      height: 16px;
      background: #2563EB;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .task-images {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .task-images img {
      width: 100%;
      max-width: 380px;
      height: 240px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #E8E0D4;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.15s;
    }
    .task-images img:hover { opacity: 0.88; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: min(90vw, 960px);
      max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: block;
    }

    #lightbox-caption {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.875rem;
      padding: 6px 18px;
      border-radius: 9999px;
      white-space: nowrap;
      pointer-events: none;
    }

    #lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }
    #lightbox-close:hover { opacity: 1; }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 44px;
      height: 64px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    .lb-nav:disabled { opacity: 0.2; cursor: default; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    #lb-counter {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
    }
    .img-caption {
      font-size: 0.75rem;
      color: #A89E93;
      margin-top: 6px;
      text-align: center;
    }
    .img-wrapper {
      flex: 1;
      min-width: 200px;
    }

    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .info-bar { padding: 12px 20px; }
      main { padding: 28px 20px; }
      .timeline::before { left: 80px; }
      .entry-date { width: 80px; }
      .entry-date .date-text { font-size: 0.72rem; }
    }
  </style>
</head>
<body>

  <header>
    <a class="back-link" href="../index.html">← 返回目錄</a>
    <div class="header-divider"></div>
    <h1>大陸蘇州機械手臂</h1>
  </header>

  <div class="info-bar">
    <span class="badge badge-active">進行中</span>
    <div class="info-item">
      <span class="icon">📅</span>
      <span>開始日期：<strong>2026/04/10</strong></span>
    </div>
    <div class="info-item">
      <span class="icon">📍</span>
      <span>地點：<strong>毅豐橡膠</strong></span>
    </div>
  </div>

  <main>
    <p class="section-title">專案進度紀錄</p>

    <div class="timeline">

      <!-- ── 2026/04/10 ── -->
      <div class="timeline-entry">
        <div class="entry-date">
          <span class="date-text">2026<br>04/10</span>
        </div>
        <div class="entry-dot"></div>
        <div class="entry-content">

          <!-- Task 1 -->
          <div class="task-item">
            <div class="task-title">機械手臂設備抵達廠內，完成卸貨定位</div>
            <div class="task-images">
              <div class="img-wrapper">
                <img src="照片/20260410/S__25829379.jpg" alt="機械手臂設備抵達廠內">
              </div>
            </div>
          </div>

          <!-- Task 2 -->
          <div class="task-item">
            <div class="task-title">配電箱初步裝配作業</div>
            <div class="task-images">
              <div class="img-wrapper">
                <img src="照片/20260410/S__25829380.jpg" alt="配電箱初步裝配">
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- ── 2026/04/11 ── -->
      <div class="timeline-entry">
        <div class="entry-date">
          <span class="date-text">2026<br>04/11</span>
        </div>
        <div class="entry-dot"></div>
        <div class="entry-content">

          <!-- Task 1 -->
          <div class="task-item">
            <div class="task-title">2號、3號配電箱初步裝配</div>
            <div class="task-images">
              <div class="img-wrapper">
                <img src="照片/20260411/S__25878531_0.jpg" alt="2號、3號配電箱初步裝配">
              </div>
            </div>
          </div>

          <!-- Task 2 -->
          <div class="task-item">
            <div class="task-title">RB-1底架初步裝配</div>
            <div class="task-images">
              <div class="img-wrapper">
                <img src="照片/20260411/S__25878532_0.jpg" alt="RB-1底架初步裝配">
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- 新增日期紀錄時在此往下加 timeline-entry -->

    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="關閉">&#x2715;</button>
    <span id="lb-counter"></span>
    <button class="lb-nav" id="lb-prev" aria-label="上一張">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lb-nav" id="lb-next" aria-label="下一張">&#8250;</button>
    <span id="lightbox-caption"></span>
  </div>

  <script>
    // 收集所有可點擊照片
    const imgs = Array.from(document.querySelectorAll('.task-images img'));
    let current = 0;

    const lb       = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbCap    = document.getElementById('lightbox-caption');
    const lbClose  = document.getElementById('lightbox-close');
    const lbPrev   = document.getElementById('lb-prev');
    const lbNext   = document.getElementById('lb-next');
    const lbCount  = document.getElementById('lb-counter');

    function open(index) {
      current = index;
      const img = imgs[current];
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      // 取上層 task-title 文字作為說明
      const taskItem = img.closest('.task-item');
      const titleEl  = taskItem ? taskItem.querySelector('.task-title') : null;
      lbCap.textContent = titleEl ? titleEl.textContent.trim() : '';
      lbCount.textContent = `${current + 1} / ${imgs.length}`;
      lbPrev.disabled = current === 0;
      lbNext.disabled = current === imgs.length - 1;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function prev() { if (current > 0) open(current - 1); }
    function next() { if (current < imgs.length - 1) open(current + 1); }

    // 綁定點擊事件
    imgs.forEach((img, i) => img.addEventListener('click', () => open(i)));

    lbClose.addEventListener('click', close);
    lbPrev.addEventListener('click', prev);
    lbNext.addEventListener('click', next);

    // 點擊遮罩關閉（點到圖片本身不關閉）
    lb.addEventListener('click', e => { if (e.target === lb) close(); });

    // 鍵盤操作
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      close();
      if (e.key === 'ArrowLeft')   prev();
      if (e.key === 'ArrowRight')  next();
    });
  </script>

</body>
</html>
