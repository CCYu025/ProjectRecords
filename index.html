<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進行中專案紀錄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: 0.02em;
    }
    header .date {
      font-size: 0.875rem;
      color: #7A6E63;
    }

    /* ── Stats bar ── */
    .stats {
      background: #2563EB;
      padding: 14px 40px;
      display: flex;
      gap: 32px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-item .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1;
    }
    .stat-item .label {
      font-size: 0.75rem;
      color: #BFDBFE;
      margin-top: 2px;
    }
    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.3);
      align-self: stretch;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 40px;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #7A6E63;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .project-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      border-color: #2563EB;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1A1A1A;
      line-height: 1.4;
      flex: 1;
      margin-right: 12px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .badge-active {
      background: #FEF3C7;
      color: #92400E;
    }
    .badge-active::before { background: #F59E0B; }
    .badge-done {
      background: #D1FAE5;
      color: #065F46;
    }
    .badge-done::before { background: #10B981; }
    .badge-paused {
      background: #FEE2E2;
      color: #991B1B;
    }
    .badge-paused::before { background: #EF4444; }

    .card-summary {
      font-size: 0.875rem;
      color: #5C4E43;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid #EDE8E0;
    }
    .card-meta {
      font-size: 0.75rem;
      color: #A89E93;
    }
    .card-arrow {
      font-size: 0.75rem;
      color: #2563EB;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <header>
    <h1>進行中專案紀錄</h1>
    <span class="date" id="today-date"></span>
  </header>

  <div class="stats">
    <div class="stat-item">
      <span class="num">1</span>
      <span class="label">專案總數</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num">1</span>
      <span class="label">進行中</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num">0</span>
      <span class="label">已完成</span>
    </div>
  </div>

  <main>
    <p class="section-title">所有專案</p>

    <div class="project-grid">

      <!-- 大陸蘇州機械手臂 -->
      <a class="project-card" href="大陸蘇州機械手臂/index.html">
        <div class="card-top">
          <span class="card-title">大陸蘇州機械手臂</span>
          <span class="badge badge-active">進行中</span>
        </div>
        <p class="card-summary">設備目前於毅豐進行組裝作業</p>
        <div class="card-footer">
          <span class="card-meta">最新更新：2026/04/11</span>
          <span class="card-arrow">查看詳情 →</span>
        </div>
      </a>

      <!-- 新增專案時在此加入卡片 -->

    </div>
  </main>

  <script>
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    document.getElementById('today-date').textContent = `${y}/${m}/${day}`;
  </script>

</body>
</html>
