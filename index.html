<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毅豐專案紀錄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── Header ── */
    header {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo {
      height: 44px;
      width: auto;
      display: block;
    }

    /* ── Stats bar ── */
    .stats {
      background: #2563EB;
      padding: 14px 40px;
      display: flex;
      gap: 32px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-item .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1;
    }
    .stat-item .label {
      font-size: 1rem;
      color: #BFDBFE;
      margin-top: 2px;
    }
    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.3);
      align-self: stretch;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 40px;
    }
    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #7A6E63;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    .project-card {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 32px;
      display: block;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .project-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      border-color: #2563EB;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 1.375rem;
      font-weight: 600;
      color: #1A1A1A;
      line-height: 1.4;
      flex: 1;
      margin-right: 12px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .badge-active {
      background: #FEF3C7;
      color: #92400E;
    }
    .badge-active::before { background: #F59E0B; }
    .badge-done {
      background: #D1FAE5;
      color: #065F46;
    }
    .badge-done::before { background: #10B981; }
    .badge-paused {
      background: #FEE2E2;
      color: #991B1B;
    }
    .badge-paused::before { background: #EF4444; }

    /* 階段進度標題列 */
    .card-info {
      margin-bottom: 14px;
    }
    .card-phase-title {
      font-size: 1rem;
      color: #5C4E43;
      font-weight: 500;
    }

    /* 時間軸進度條 */
    .card-timeline {
      margin-bottom: 14px;
    }
    .timeline-label {
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .timeline-dates { color: #7A6E63; }
    .timeline-pct   { font-weight: 600; color: #2563EB; }
    .timeline-bar {
      height: 9px;
      background: #EDE8E0;
      border-radius: 9999px;
      overflow: hidden;
    }
    .timeline-fill {
      height: 100%;
      background: #2563EB;
      border-radius: 9999px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* 階段膠囊列 */
    .card-phase { margin-bottom: 16px; }
    .phase-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .phase-step {
      font-size: 1rem;
      padding: 5px 15px;
      border-radius: 9999px;
      border: 2px solid #D4C9BC;
      color: #7A6E63;
      background: transparent;
      white-space: nowrap;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .phase-step.done {
      background: #D1FAE5;
      border-color: #A7F3D0;
      color: #065F46;
    }
    .phase-step.active {
      background: #2563EB;
      border-color: #2563EB;
      color: #fff;
      font-weight: 600;
      animation: phase-glow 2s ease-in-out infinite;
    }
    .phase-step.selected {
      border: 2px solid #F59E0B;
      background: #FEF3C7;
      color: #92400E;
    }
    @keyframes phase-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(37,99,235,0); }
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid #EDE8E0;
    }
    .card-meta {
      font-size: 1rem;
      color: #7A6E63;
    }
    .card-arrow {
      font-size: 0.9rem;
      color: #2563EB;
      font-weight: 600;
      padding: 5px 14px;
      border: 1.5px solid #2563EB;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }
    .project-card:hover .card-arrow,
    .card-arrow:hover {
      background: #2563EB;
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html"><img src="assets/logo.png" alt="毅豐專案紀錄" class="site-logo"></a>
  </header>

  <div class="stats">
    <div class="stat-item">
      <span class="num" id="stat-total">0</span>
      <span class="label">專案總數</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num" id="stat-active">0</span>
      <span class="label">進行中</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num" id="stat-done">0</span>
      <span class="label">已完成</span>
    </div>
  </div>

  <main>
    <div class="project-grid"></div>
  </main>

  <script src="大陸蘇州機械手臂/project-info.js"></script>
  <script>
    // ── 統計計數 ──
    let _total = 0, _done = 0, _paused = 0;
    function updateStats() {
      document.getElementById('stat-total').textContent  = _total;
      document.getElementById('stat-active').textContent = _total - _done - _paused;
      document.getElementById('stat-done').textContent   = _done;
    }

    // ── 依今日日期自動偵測當前階段 index ──
    function detectCurrentPhase(phases) {
      const now = new Date(); now.setHours(0, 0, 0, 0);
      const first = new Date(phases[0].start); first.setHours(0, 0, 0, 0);
      if (now < first) return 0;
      for (let i = 0; i < phases.length; i++) {
        const s = new Date(phases[i].start); s.setHours(0, 0, 0, 0);
        const e = new Date(phases[i].end);   e.setHours(0, 0, 0, 0);
        if (now >= s && now <= e) return i;
        if (i < phases.length - 1) {
          const ns = new Date(phases[i + 1].start); ns.setHours(0, 0, 0, 0);
          if (now > e && now < ns) return i + 1;
        }
      }
      return phases.length - 1;
    }

    // ── 工具函式 ──
    function calcPhasePct(phase) {
      const start = new Date(phase.start); start.setHours(0, 0, 0, 0);
      const end   = new Date(phase.end);   end.setHours(0, 0, 0, 0);
      const now   = new Date();            now.setHours(0, 0, 0, 0);
      if (now < start) return 0;
      if (now >= end)  return 100;
      return Math.min(100, Math.max(0, (now - start) / (end - start) * 100));
    }

    function fmtDate(dateStr) {
      const d = new Date(dateStr);
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function updatePhaseDisplay(key, data, idx) {
      const phase = data.phases[idx];
      const titleEl = document.getElementById('card-phase-title-' + key);
      if (titleEl) titleEl.textContent = '進度：' + phase.title;
      const tl = document.getElementById('card-timeline-' + key);
      if (tl) {
        const start = new Date(phase.start); start.setHours(0, 0, 0, 0);
        const now   = new Date();            now.setHours(0, 0, 0, 0);
        const pct   = calcPhasePct(phase);
        tl.querySelector('.timeline-dates').textContent = fmtDate(phase.start) + ' ─── ' + fmtDate(phase.end);
        const pctEl = tl.querySelector('.timeline-pct');
        pctEl.textContent = Math.round(pct) + '%';
        pctEl.style.color = now < start ? '#7A6E63' : '#2563EB';
        tl.querySelector('.timeline-fill').style.width = pct.toFixed(1) + '%';
      }
    }

    // ── 主函式：建立卡片 + 綁定事件 ──
    // badgeClass: 'badge-done' | 'badge-paused' | 未傳入（進行中）
    function renderProject(key, data, badgeClass) {
      // 統計
      _total++;
      if (badgeClass === 'badge-done')   _done++;
      if (badgeClass === 'badge-paused') _paused++;
      updateStats();

      // 建立卡片 HTML
      const href = key + '/index.html';
      const badgeLabel = { 'badge-done': '已完成', 'badge-paused': '暫停' };
      const badgeHtml  = badgeClass
        ? `<span class="badge ${badgeClass}">${badgeLabel[badgeClass]}</span>`
        : '';

      const card = document.createElement('div');
      card.className    = 'project-card';
      card.id           = 'project-card-' + key;
      card.dataset.href = href;
      card.innerHTML = `
        <div class="card-top">
          <span class="card-title">${key}</span>${badgeHtml}
        </div>
        <div class="card-info">
          <span class="card-phase-title" id="card-phase-title-${key}"></span>
        </div>
        <div class="card-timeline" id="card-timeline-${key}">
          <div class="timeline-label">
            <span class="timeline-dates"></span>
            <span class="timeline-pct">--%</span>
          </div>
          <div class="timeline-bar"><div class="timeline-fill"></div></div>
        </div>
        <div class="card-phase">
          <div class="phase-steps" id="card-phases-${key}"></div>
        </div>
        <div class="card-footer">
          <span class="card-meta" id="card-update-${key}"></span>
          <a class="card-arrow" href="${href}">查看詳情 →</a>
        </div>
      `;
      document.querySelector('.project-grid').appendChild(card);

      // 最新更新
      document.getElementById('card-update-' + key).textContent = '最新更新：' + data.lastUpdate;

      // 自動偵測當前階段
      const currentIdx = detectCurrentPhase(data.phases);

      // 階段膠囊
      const ps = document.getElementById('card-phases-' + key);
      ps.innerHTML = data.phases.map((phase, i) => {
        let cls = 'phase-step';
        if (i < currentIdx)  cls += ' done';
        if (i === currentIdx) cls += ' active';
        return `<button class="${cls}" data-index="${i}">${phase.name}</button>`;
      }).join('');

      ps.addEventListener('click', function(e) {
        const btn = e.target.closest('button.phase-step');
        if (!btn) return;
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index, 10);
        ps.querySelectorAll('.phase-step').forEach(b => b.classList.remove('selected'));
        if (idx !== currentIdx) btn.classList.add('selected');
        updatePhaseDisplay(key, data, idx);
      });

      // 預設顯示當前進行中階段
      updatePhaseDisplay(key, data, currentIdx);

      // 卡片整體可點
      card.addEventListener('click', function(e) {
        if (e.target.closest('button') || e.target.closest('a')) return;
        window.location.href = href;
      });
    }

    // ── 專案清單（新增專案只需加這兩行）──
    renderProject('大陸蘇州機械手臂', 大陸蘇州機械手臂);
  </script>

</body>
</html>
