<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進行中專案紀錄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── Header ── */
    header {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: 0.02em;
    }

    /* ── Stats bar ── */
    .stats {
      background: #2563EB;
      padding: 14px 40px;
      display: flex;
      gap: 32px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-item .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1;
    }
    .stat-item .label {
      font-size: 1rem;
      color: #BFDBFE;
      margin-top: 2px;
    }
    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.3);
      align-self: stretch;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 40px;
    }
    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #7A6E63;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    .project-card {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .project-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      border-color: #2563EB;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 1.375rem;
      font-weight: 600;
      color: #1A1A1A;
      line-height: 1.4;
      flex: 1;
      margin-right: 12px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .badge-active {
      background: #FEF3C7;
      color: #92400E;
    }
    .badge-active::before { background: #F59E0B; }
    .badge-done {
      background: #D1FAE5;
      color: #065F46;
    }
    .badge-done::before { background: #10B981; }
    .badge-paused {
      background: #FEE2E2;
      color: #991B1B;
    }
    .badge-paused::before { background: #EF4444; }

    /* 地點資訊列 */
    .card-info {
      margin-bottom: 14px;
    }
    .card-info-item {
      font-size: 1rem;
      color: #7A6E63;
    }

    /* 時間軸進度條 */
    .card-timeline {
      margin-bottom: 14px;
    }
    .timeline-label {
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .timeline-dates { color: #7A6E63; }
    .timeline-pct   { font-weight: 600; color: #2563EB; }
    .timeline-bar {
      height: 9px;
      background: #EDE8E0;
      border-radius: 9999px;
      overflow: hidden;
    }
    .timeline-fill {
      height: 100%;
      background: #2563EB;
      border-radius: 9999px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* 階段膠囊列 */
    .card-phase { margin-bottom: 16px; }
    .phase-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .phase-step {
      font-size: 1rem;
      padding: 5px 15px;
      border-radius: 9999px;
      border: 1px solid #D4C9BC;
      color: #7A6E63;
      background: transparent;
      white-space: nowrap;
    }
    .phase-step.done {
      background: #D1FAE5;
      border-color: #A7F3D0;
      color: #065F46;
    }
    .phase-step.active {
      background: #2563EB;
      border-color: #2563EB;
      color: #fff;
      font-weight: 600;
      animation: phase-glow 2s ease-in-out infinite;
    }
    @keyframes phase-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(37,99,235,0); }
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid #EDE8E0;
    }
    .card-meta {
      font-size: 1rem;
      color: #7A6E63;
    }
    .card-arrow {
      font-size: 0.9rem;
      color: #2563EB;
      font-weight: 600;
      padding: 5px 14px;
      border: 1.5px solid #2563EB;
      border-radius: 6px;
    }
    .project-card:hover .card-arrow {
      background: #2563EB;
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <h1>進行中專案紀錄</h1>
  </header>

  <div class="stats">
    <div class="stat-item">
      <span class="num">1</span>
      <span class="label">專案總數</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num">1</span>
      <span class="label">進行中</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num">0</span>
      <span class="label">已完成</span>
    </div>
  </div>

  <main>
    <div class="project-grid">

      <!-- 大陸蘇州機械手臂 -->
      <a class="project-card" href="大陸蘇州機械手臂/index.html">
        <div class="card-top">
          <span class="card-title">大陸蘇州機械手臂</span>
        </div>
        <div class="card-info">
          <span class="card-info-item" id="card-location-大陸蘇州機械手臂"></span>
        </div>
        <div class="card-timeline" id="card-timeline-大陸蘇州機械手臂">
          <div class="timeline-label">
            <span class="timeline-dates"></span>
            <span class="timeline-pct">--%</span>
          </div>
          <div class="timeline-bar">
            <div class="timeline-fill"></div>
          </div>
        </div>
        <div class="card-phase">
          <div class="phase-steps" id="card-phases-大陸蘇州機械手臂"></div>
        </div>
        <div class="card-footer">
          <span class="card-meta" id="card-update-大陸蘇州機械手臂"></span>
          <span class="card-arrow">查看詳情 →</span>
        </div>
      </a>

      <!-- 新增專案時在此加入卡片 -->

    </div>
  </main>

  <script src="大陸蘇州機械手臂/project-info.js"></script>
  <script>
    // 渲染專案卡片資訊
    function renderProject(key, data) {
      // 地點
      const loc = document.getElementById('card-location-' + key);
      if (loc) loc.textContent = '地點：' + data.location;

      // 最新更新
      const upd = document.getElementById('card-update-' + key);
      if (upd) upd.textContent = '最新更新：' + data.lastUpdate;

      // 時間軸進度條
      const tl = document.getElementById('card-timeline-' + key);
      if (tl) {
        const start = new Date(data.startDate);
        const end   = new Date(data.endDate);
        const now   = new Date();
        const pct   = Math.min(100, Math.max(0, (now - start) / (end - start) * 100));
        const fmt   = dt => (dt.getMonth() + 1) + '/' + dt.getDate();
        tl.querySelector('.timeline-dates').textContent = fmt(start) + ' ─── ' + fmt(end);
        tl.querySelector('.timeline-pct').textContent   = Math.round(pct) + '%';
        tl.querySelector('.timeline-fill').style.width  = pct.toFixed(1) + '%';
      }

      // 階段膠囊
      const ps = document.getElementById('card-phases-' + key);
      if (ps) {
        ps.innerHTML = data.phases.map((name, i) => {
          let cls = 'phase-step';
          if (i <= data.doneUpTo)      cls += ' done';
          if (i === data.currentPhase) cls += ' active';
          return `<span class="${cls}">${name}</span>`;
        }).join('');
      }
    }

    renderProject('大陸蘇州機械手臂', 大陸蘇州機械手臂);
  </script>

</body>
</html>
