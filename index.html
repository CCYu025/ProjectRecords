<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毅豐專案紀錄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      line-height: 1.8;
    }

    /* ── Header ── */
    header {
      background: #FDFAF6;
      border-bottom: 1px solid #E8E0D4;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo { height: 44px; width: auto; display: block; }

    /* ── Stats bar ── */
    .stats { background: #2563EB; padding: 14px 40px; display: flex; gap: 32px; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-item .num { font-size: 1.5rem; font-weight: 700; color: #FFFFFF; line-height: 1; }
    .stat-item .label { font-size: 1rem; color: #BFDBFE; margin-top: 2px; }
    .stat-divider { width: 1px; background: rgba(255,255,255,0.3); align-self: stretch; }

    /* ── Main content ── */
    main { max-width: 1100px; margin: 0 auto; padding: 36px 40px; }
    /* ── Project grid ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    .project-card {
      background: #FDFAF6;
      border: 1px solid #E8E0D4;
      border-radius: 10px;
      padding: 32px;
      display: block;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 1.375rem; font-weight: 600; color: #1A1A1A; line-height: 1.4; flex: 1; margin-right: 12px; }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 9999px;
      font-size: 0.875rem; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; }
    .badge-done { background: #D1FAE5; color: #065F46; }
    .badge-done::before { background: #10B981; }
    .badge-paused { background: #FEE2E2; color: #991B1B; }
    .badge-paused::before { background: #EF4444; }

    /* 階段進度 */
    .card-info { margin-bottom: 14px; }
    .card-phase-title { font-size: 1rem; color: #5C4E43; font-weight: 500; }

    .card-timeline { margin-bottom: 14px; }
    .timeline-label { font-size: 1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .timeline-dates { color: #7A6E63; }
    .timeline-pct { font-weight: 600; color: #2563EB; }
    .timeline-bar { height: 9px; background: #EDE8E0; border-radius: 9999px; overflow: hidden; }
    .timeline-fill { height: 100%; background: #2563EB; border-radius: 9999px; width: 0%; transition: width 0.4s ease; }

    /* 階段膠囊列 */
    .card-phase { margin-bottom: 16px; }
    .phase-steps { display: flex; flex-wrap: wrap; gap: 6px; }
    .phase-step {
      font-size: 1rem; padding: 5px 15px; border-radius: 9999px;
      border: 2px solid #D4C9BC; color: #7A6E63; background: transparent;
      white-space: nowrap; cursor: pointer; font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .phase-step.done { background: #D1FAE5; border-color: #A7F3D0; color: #065F46; }
    .phase-step.active {
      background: #2563EB; border-color: #2563EB; color: #fff; font-weight: 600;
      animation: phase-glow 2s ease-in-out infinite;
    }
    .phase-step.selected { border: 2px solid #F59E0B; background: #FEF3C7; color: #92400E; }
    @keyframes phase-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(37,99,235,0); }
    }

    /* Card footer */
    .card-footer { display: flex; flex-direction: column; gap: 12px; padding-top: 14px; border-top: 1px solid #EDE8E0; }
    .card-meta { font-size: 1rem; color: #7A6E63; }

    /* 按鈕列（施工紀錄 + 專案文件並排）*/
    .card-footer-btns { display: flex; gap: 10px; }
    .card-rec-btn, .card-docs-btn {
      flex: 1; height: 48px; border-radius: 9999px;
      border: 1.5px solid #2563EB; background: transparent;
      color: #2563EB; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    .card-rec-btn:hover, .card-docs-btn:hover { background: #EFF6FF; }
    .btn-icon { font-size: 1.375rem; line-height: 1; }

    /* ── 專案文件底部抽屜 ── */
    .doc-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .doc-backdrop.open { opacity: 1; pointer-events: auto; }
    .doc-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 90vh; background: #FDFAF6;
      border-radius: 16px 16px 0 0; z-index: 101;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.3s ease;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
    }
    .doc-sheet.open { transform: translateY(0); }
    .doc-sheet-handle {
      width: 32px; height: 4px; background: #D4C9BC;
      border-radius: 9999px; margin: 12px auto 0; flex-shrink: 0; cursor: grab;
      touch-action: none;
    }
    .doc-sheet-header {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 12px 20px; flex-shrink: 0;
      touch-action: none;
    }
    .doc-close-btn {
      height: 44px; padding: 0 16px; border-radius: 9999px;
      border: 1.5px solid #D4C9BC; background: transparent;
      font-size: 1rem; font-weight: 600; color: #1A1A1A; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-family: inherit; flex-shrink: 0; white-space: nowrap;
    }
    .doc-close-btn:hover { background: #EDE8E0; border-color: #B8AFA6; }
    .doc-sheet-body { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
    .doc-category-header {
      font-size: 1.25rem; font-weight: 700; color: #5C4E43;
      letter-spacing: 0.02em; padding: 20px 24px 12px;
      border-bottom: 1px solid #E8E0D4; margin-bottom: 16px;
    }
    .doc-grid-row { display: flex; flex-wrap: wrap; gap: 16px; padding: 0 24px; }
    .doc-card {
      background: #F5F0E8; border: 1px solid #E8E0D4;
      border-radius: 10px; padding: 20px 16px; width: 160px;
      text-align: center; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .doc-card:hover { border-color: #2563EB; box-shadow: 0 4px 16px rgba(37,99,235,0.1); }
    .doc-card-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .doc-card-name { font-size: 1rem; font-weight: 600; color: #1A1A1A; line-height: 1.4; }
    .doc-card-desc { font-size: 1rem; color: #7A6E63; margin-top: 6px; line-height: 1.5; }

    /* ── 全螢幕文件覆層 ── */
    .doc-viewer-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
    }
    .doc-viewer-bar {
      height: 52px; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0;
    }
    .doc-viewer-name { color: #fff; font-size: 1rem; font-weight: 500; }
    .doc-viewer-close {
      color: #fff; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; padding: 5px 14px;
      font-size: 0.9rem; cursor: pointer; font-family: inherit;
    }
    .doc-viewer-close:hover { background: rgba(255,255,255,0.25); }
    .doc-viewer-content { flex: 1; display: flex; align-items: center; justify-content: center; }
    .doc-viewer-content iframe { width: 100%; height: 100%; border: none; }
    .doc-viewer-content img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── 施工紀錄底部抽屜（z-index 300+，高於文件抽屜）── */
    .rec-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .rec-backdrop.open { opacity: 1; pointer-events: auto; }
    .rec-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 90vh; background: #FDFAF6;
      border-radius: 16px 16px 0 0; z-index: 301;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.3s ease;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
    }
    .rec-sheet.open { transform: translateY(0); }
    .rec-sheet-handle {
      width: 32px; height: 4px; background: #D4C9BC;
      border-radius: 9999px; margin: 12px auto 0; flex-shrink: 0; cursor: grab;
      touch-action: none;
    }
    .rec-sheet-header {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 12px 20px 0; flex-shrink: 0;
      touch-action: none;
    }
    .rec-close-btn {
      height: 44px; padding: 0 16px; border-radius: 9999px;
      border: 1.5px solid #D4C9BC; background: transparent;
      font-size: 1rem; font-weight: 600; color: #1A1A1A; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-family: inherit; flex-shrink: 0; white-space: nowrap;
    }
    .rec-close-btn:hover { background: #EDE8E0; border-color: #B8AFA6; }

    /* 抽屜主內容（iframe）*/
    .rec-sheet-body { flex: 1; overflow: hidden; }
    .rec-frame { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <header>
    <a href="index.html"><img src="assets/logo.png" alt="毅豐專案紀錄" class="site-logo"></a>
  </header>

  <div class="stats">
    <div class="stat-item">
      <span class="num" id="stat-total">0</span>
      <span class="label">專案總數</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num" id="stat-active">0</span>
      <span class="label">進行中</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="num" id="stat-done">0</span>
      <span class="label">已完成</span>
    </div>
  </div>

  <main>
    <div class="project-grid"></div>
  </main>

  <!-- 專案文件底部抽屜 -->
  <div id="doc-backdrop" class="doc-backdrop"></div>
  <div id="doc-sheet" class="doc-sheet">
    <div class="doc-sheet-handle"></div>
    <div class="doc-sheet-header">
      <button id="doc-close-btn" class="doc-close-btn" aria-label="關閉">✕ 關閉</button>
    </div>
    <div id="doc-sheet-body" class="doc-sheet-body"></div>
  </div>

  <!-- 全螢幕文件覆層 -->
  <div id="doc-viewer-overlay" class="doc-viewer-overlay" style="display:none">
    <div class="doc-viewer-bar">
      <span id="doc-viewer-name" class="doc-viewer-name"></span>
      <button id="doc-viewer-close" class="doc-viewer-close" aria-label="關閉">✕ 關閉</button>
    </div>
    <div id="doc-viewer-content" class="doc-viewer-content"></div>
  </div>

  <!-- 施工紀錄底部抽屜 -->
  <div id="rec-backdrop" class="rec-backdrop"></div>
  <div id="rec-sheet" class="rec-sheet">
    <div class="rec-sheet-handle"></div>
    <div class="rec-sheet-header">
      <button id="rec-close-btn" class="rec-close-btn" aria-label="關閉">✕ 關閉</button>
    </div>
    <div class="rec-sheet-body">
      <iframe id="rec-frame" class="rec-frame" src="" title="施工紀錄"></iframe>
    </div>
  </div>

  <script src="大陸蘇州機械手臂/project-info.js"></script>
  <script>
    // ── 統計計數 ──
    var _total = 0, _done = 0, _paused = 0;
    function updateStats() {
      document.getElementById('stat-total').textContent  = _total;
      document.getElementById('stat-active').textContent = _total - _done - _paused;
      document.getElementById('stat-done').textContent   = _done;
    }

    // ── 依今日日期自動偵測當前階段 index ──
    function detectCurrentPhase(phases) {
      var now = new Date(); now.setHours(0, 0, 0, 0);
      var first = new Date(phases[0].start); first.setHours(0, 0, 0, 0);
      if (now < first) return 0;
      for (var i = 0; i < phases.length; i++) {
        var s = new Date(phases[i].start); s.setHours(0, 0, 0, 0);
        var e = new Date(phases[i].end);   e.setHours(0, 0, 0, 0);
        if (now >= s && now <= e) return i;
        if (i < phases.length - 1) {
          var ns = new Date(phases[i + 1].start); ns.setHours(0, 0, 0, 0);
          if (now > e && now < ns) return i + 1;
        }
      }
      return phases.length - 1;
    }

    function calcPhasePct(phase) {
      var start = new Date(phase.start); start.setHours(0, 0, 0, 0);
      var end   = new Date(phase.end);   end.setHours(0, 0, 0, 0);
      var now   = new Date();            now.setHours(0, 0, 0, 0);
      if (now < start) return 0;
      if (now >= end)  return 100;
      return Math.min(100, Math.max(0, (now - start) / (end - start) * 100));
    }

    function fmtDate(dateStr) {
      var d = new Date(dateStr);
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function updatePhaseDisplay(key, data, idx) {
      var phase = data.phases[idx];
      var titleEl = document.getElementById('card-phase-title-' + key);
      if (titleEl) titleEl.textContent = '進度：' + phase.title;
      var tl = document.getElementById('card-timeline-' + key);
      if (tl) {
        var start = new Date(phase.start); start.setHours(0, 0, 0, 0);
        var now   = new Date();            now.setHours(0, 0, 0, 0);
        var pct   = calcPhasePct(phase);
        tl.querySelector('.timeline-dates').textContent = fmtDate(phase.start) + ' ─── ' + fmtDate(phase.end);
        var pctEl = tl.querySelector('.timeline-pct');
        pctEl.textContent = Math.round(pct) + '%';
        pctEl.style.color = now < start ? '#7A6E63' : '#2563EB';
        tl.querySelector('.timeline-fill').style.width = pct.toFixed(1) + '%';
      }
    }

    // ── 主函式：建立卡片 ──
    function renderProject(key, data, badgeClass) {
      _total++;
      if (badgeClass === 'badge-done')   _done++;
      if (badgeClass === 'badge-paused') _paused++;
      updateStats();

      var badgeLabel = { 'badge-done': '已完成', 'badge-paused': '暫停' };
      var badgeHtml  = badgeClass
        ? '<span class="badge ' + badgeClass + '">' + badgeLabel[badgeClass] + '</span>'
        : '';

      var hasRec  = !!data.hasRecords;
      var hasDocs = !!(data.documents && data.documents.length);
      var btnsHtml = '';
      if (hasRec || hasDocs) {
        btnsHtml = '<div class="card-footer-btns">';
        if (hasRec)  btnsHtml += '<button class="card-rec-btn"><span class="btn-icon">📋</span>專案紀錄</button>';
        if (hasDocs) btnsHtml += '<button class="card-docs-btn"><span class="btn-icon">📂</span>專案文件</button>';
        btnsHtml += '</div>';
      }

      var card = document.createElement('div');
      card.className = 'project-card';
      card.id        = 'project-card-' + key;
      card.innerHTML =
        '<div class="card-top">' +
          '<span class="card-title">' + key + '</span>' + badgeHtml +
        '</div>' +
        '<div class="card-info">' +
          '<span class="card-phase-title" id="card-phase-title-' + key + '"></span>' +
        '</div>' +
        '<div class="card-timeline" id="card-timeline-' + key + '">' +
          '<div class="timeline-label">' +
            '<span class="timeline-dates"></span>' +
            '<span class="timeline-pct">--%</span>' +
          '</div>' +
          '<div class="timeline-bar"><div class="timeline-fill"></div></div>' +
        '</div>' +
        '<div class="card-phase">' +
          '<div class="phase-steps" id="card-phases-' + key + '"></div>' +
        '</div>' +
        '<div class="card-footer">' +
          '<span class="card-meta" id="card-update-' + key + '"></span>' +
          btnsHtml +
        '</div>';

      document.querySelector('.project-grid').appendChild(card);

      document.getElementById('card-update-' + key).textContent = '最新更新：' + data.lastUpdate;

      var currentIdx = detectCurrentPhase(data.phases);
      var ps = document.getElementById('card-phases-' + key);
      ps.innerHTML = data.phases.map(function(phase, i) {
        var cls = 'phase-step';
        if (i < currentIdx)   cls += ' done';
        if (i === currentIdx) cls += ' active';
        return '<button class="' + cls + '" data-index="' + i + '">' + phase.name + '</button>';
      }).join('');

      ps.addEventListener('click', function(e) {
        var btn = e.target.closest('button.phase-step');
        if (!btn) return;
        e.stopPropagation();
        var idx = parseInt(btn.dataset.index, 10);
        ps.querySelectorAll('.phase-step').forEach(function(b) { b.classList.remove('selected'); });
        if (idx !== currentIdx) btn.classList.add('selected');
        updatePhaseDisplay(key, data, idx);
      });
      updatePhaseDisplay(key, data, currentIdx);

      // 施工紀錄按鈕
      var recBtn = card.querySelector('.card-rec-btn');
      if (recBtn) recBtn.addEventListener('click', function() { openRecSheet(key); });

      // 專案文件按鈕
      var docsBtn = card.querySelector('.card-docs-btn');
      if (docsBtn) docsBtn.addEventListener('click', function() { openDocSheet(key, data.documents); });

    }

    // ── 專案文件底部抽屜 ──
    function openDocSheet(key, docs) {
      var body = document.getElementById('doc-sheet-body');
      body.innerHTML = '';
      docs.forEach(function(cat) {
        var header = document.createElement('div');
        header.className = 'doc-category-header';
        header.textContent = cat.category;
        body.appendChild(header);
        var row = document.createElement('div');
        row.className = 'doc-grid-row';
        cat.files.forEach(function(doc) {
          var card = document.createElement('div');
          card.className = 'doc-card';
          var icon = doc.type === 'pdf' ? '📄' : '🖼️';
          card.innerHTML =
            '<div class="doc-card-icon">' + icon + '</div>' +
            '<div class="doc-card-name">' + doc.name + '</div>' +
            '<div class="doc-card-desc">' + doc.desc + '</div>';
          card.addEventListener('click', function() { openDocViewer(key, doc); });
          row.appendChild(card);
        });
        body.appendChild(row);
      });
      document.getElementById('doc-backdrop').classList.add('open');
      document.getElementById('doc-sheet').classList.add('open');
      document.body.style.overscrollBehavior = 'none';
    }

    function closeDocSheet() {
      var sheet = document.getElementById('doc-sheet');
      sheet.style.transition = 'transform 0.3s ease';
      sheet.style.transform = '';
      document.getElementById('doc-backdrop').classList.remove('open');
      sheet.classList.remove('open');
      document.body.style.overscrollBehavior = '';
      setTimeout(function() {
        document.getElementById('doc-sheet-body').innerHTML = '';
      }, 300);
    }

    function openDocViewer(key, doc) {
      var path = key + '/' + doc.file;
      var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
      if (doc.type === 'pdf' && isMobile) { window.open(path, '_blank'); return; }
      document.getElementById('doc-viewer-name').textContent = doc.name;
      var content = document.getElementById('doc-viewer-content');
      content.innerHTML = '';
      if (doc.type === 'pdf') {
        var frame = document.createElement('iframe');
        frame.src = path;
        content.appendChild(frame);
      } else {
        var img = document.createElement('img');
        img.src = path; img.alt = doc.name;
        content.appendChild(img);
      }
      document.getElementById('doc-viewer-overlay').style.display = 'flex';
    }

    function closeDocViewer() {
      document.getElementById('doc-viewer-overlay').style.display = 'none';
      document.getElementById('doc-viewer-content').innerHTML = '';
    }

    // ── 施工紀錄抽屜 ──
    var recSheet    = document.getElementById('rec-sheet');
    var recBackdrop = document.getElementById('rec-backdrop');

    function openRecSheet(key) {
      document.getElementById('rec-frame').src = key + '/index.html';
      recBackdrop.classList.add('open');
      recSheet.style.transition = 'transform 0.3s ease';
      recSheet.style.transform = '';
      recSheet.classList.add('open');
      document.body.style.overscrollBehavior = 'none';
    }

    function closeRecSheet() {
      recSheet.style.transition = 'transform 0.3s ease';
      recSheet.style.transform = '';
      recBackdrop.classList.remove('open');
      recSheet.classList.remove('open');
      document.body.style.overscrollBehavior = '';
      setTimeout(function() {
        document.getElementById('rec-frame').src = '';
      }, 300);
    }

    // ── 拖曳關閉：文件抽屜 ──
    (function() {
      var sheet   = document.getElementById('doc-sheet');
      var handle  = sheet.querySelector('.doc-sheet-handle');
      var hdr     = sheet.querySelector('.doc-sheet-header');
      var dragging = false, startY = 0, currentDelta = 0, THRESHOLD = 120;

      function dragStart(clientY) {
        if (!sheet.classList.contains('open')) return;
        dragging = true; startY = clientY; currentDelta = 0;
        sheet.style.transition = 'none';
      }
      function dragMove(clientY) {
        if (!dragging) return;
        var delta = Math.max(0, clientY - startY);
        currentDelta = delta;
        sheet.style.transform = 'translateY(' + delta + 'px)';
      }
      function dragEnd() {
        if (!dragging) return;
        dragging = false;
        sheet.style.transition = 'transform 0.3s ease';
        if (currentDelta >= THRESHOLD) { sheet.style.transform = 'translateY(100%)'; setTimeout(closeDocSheet, 300); }
        else sheet.style.transform = 'translateY(0)';
      }
      handle.addEventListener('touchstart', function(e) { e.preventDefault(); dragStart(e.touches[0].clientY); }, { passive: false });
      hdr.addEventListener('touchstart', function(e) { dragStart(e.touches[0].clientY); }, { passive: false });
      [handle, hdr].forEach(function(el) {
        el.addEventListener('mousedown', function(e) { dragStart(e.clientY); e.preventDefault(); });
      });
      document.addEventListener('touchmove', function(e) { if (dragging) { e.preventDefault(); dragMove(e.touches[0].clientY); } }, { passive: false });
      document.addEventListener('touchend', function() { dragEnd(); });
      document.addEventListener('mousemove', function(e) { if (dragging) dragMove(e.clientY); });
      document.addEventListener('mouseup', function() { dragEnd(); });
    })();

    // ── 拖曳關閉：施工紀錄抽屜 ──
    (function() {
      var handle  = recSheet.querySelector('.rec-sheet-handle');
      var hdr     = recSheet.querySelector('.rec-sheet-header');
      var dragging = false, startY = 0, currentDelta = 0, THRESHOLD = 120;

      function dragStart(clientY) {
        if (!recSheet.classList.contains('open')) return;
        dragging = true; startY = clientY; currentDelta = 0;
        recSheet.style.transition = 'none';
      }
      function dragMove(clientY) {
        if (!dragging) return;
        var delta = Math.max(0, clientY - startY);
        currentDelta = delta;
        recSheet.style.transform = 'translateY(' + delta + 'px)';
      }
      function dragEnd() {
        if (!dragging) return;
        dragging = false;
        recSheet.style.transition = 'transform 0.3s ease';
        if (currentDelta >= THRESHOLD) { recSheet.style.transform = 'translateY(100%)'; setTimeout(closeRecSheet, 300); }
        else recSheet.style.transform = 'translateY(0)';
      }
      handle.addEventListener('touchstart', function(e) { e.preventDefault(); dragStart(e.touches[0].clientY); }, { passive: false });
      hdr.addEventListener('touchstart', function(e) { dragStart(e.touches[0].clientY); }, { passive: false });
      [handle, hdr].forEach(function(el) {
        el.addEventListener('mousedown', function(e) { dragStart(e.clientY); e.preventDefault(); });
      });
      document.addEventListener('touchmove', function(e) { if (dragging) { e.preventDefault(); dragMove(e.touches[0].clientY); } }, { passive: false });
      document.addEventListener('touchend', function() { dragEnd(); });
      document.addEventListener('mousemove', function(e) { if (dragging) dragMove(e.clientY); });
      document.addEventListener('mouseup', function() { dragEnd(); });
    })();

    // ── 事件綁定 ──
    document.getElementById('doc-backdrop').addEventListener('click', closeDocSheet);
    document.getElementById('doc-close-btn').addEventListener('click', closeDocSheet);
    document.getElementById('doc-viewer-close').addEventListener('click', closeDocViewer);
    recBackdrop.addEventListener('click', closeRecSheet);
    document.getElementById('rec-close-btn').addEventListener('click', closeRecSheet);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (recSheet.classList.contains('open')) { closeRecSheet(); return; }
        if (document.getElementById('doc-viewer-overlay').style.display !== 'none') { closeDocViewer(); return; }
        if (document.getElementById('doc-sheet').classList.contains('open')) { closeDocSheet(); }
      }
    });

    // ── 專案清單（新增專案只需加這兩行）──
    renderProject('大陸蘇州機械手臂', 大陸蘇州機械手臂);
  </script>
